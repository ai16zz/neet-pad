[package]
name = "neet-pad"
version = "0.1.0"
description = "NEET PAD – Solana bonding curve launchpad"
edition = "2021"

[lib]
crate-type = ["cdylib", "lib"]
name = "neet_pad"

[features]
no-entrypoint = []
no-idl = []
no-log-ix-name = []
cpi = ["no-entrypoint"]
default = []

[dependencies]
anchor-lang  = { version = "0.30.1", features = ["init-if-needed"] }
anchor-spl   = { version = "0.30.1", features = ["token", "associated_token"] }

# Pin toml_datetime to edition2021 version; 1.1.0 uses edition2024 which Cargo 1.79 cannot parse.
# This constrains resolution from the start so Cargo never downloads 1.1.0's manifest.
[dev-dependencies]
toml_datetime = "=1.0.1"
