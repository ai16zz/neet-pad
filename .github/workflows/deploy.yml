name: Build & Deploy NEET PAD to Devnet

on:
  push:
    branches: [main]
    paths: ['programs/**', 'Anchor.toml', 'Cargo.toml']
  workflow_dispatch:
    inputs:
      network:
        description: 'Target network'
        required: true
        default: 'devnet'
        type: choice
        options: [devnet, mainnet-beta]

env:
  SOLANA_VERSION: "1.18.22"
  ANCHOR_VERSION: "0.30.1"
  # Rust 1.82 generates v3 Cargo.lock (platform-tools can read).
  # Rust 1.85 generates v4 Cargo.lock (platform-tools CANNOT read).
  # We use 1.85 only for anchor-cli install (time crate compat),
  # then switch to 1.82 for the actual program build.
  BUILD_RUST_VERSION: "1.82"
  NETWORK: ${{ github.event.inputs.network || 'devnet' }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: rust-1.82-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: rust-1.82-

      - name: Install stable Rust 1.85 (for anchor-cli install only)
        uses: dtolnay/rust-toolchain@stable

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/v${{ env.SOLANA_VERSION }}/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Install Anchor CLI (needs Rust 1.85 for time crate compat)
        run: |
          # --force without --locked lets Cargo select updated deps (fixes time crate / Rust 1.85)
          cargo install anchor-cli --version ${{ env.ANCHOR_VERSION }} --force

      - name: Install Rust ${{ env.BUILD_RUST_VERSION }} for program build
        run: |
          # Rust 1.82 generates v3 Cargo.lock which platform-tools Cargo can read.
          # All edition2024 deps are pinned in Cargo.toml so 1.82 can parse the dep tree.
          rustup toolchain install ${{ env.BUILD_RUST_VERSION }} --profile minimal
          rustup default ${{ env.BUILD_RUST_VERSION }}
          cargo --version
          echo "Active Rust: $(rustc --version)"

      - name: Setup deployer wallet
        env:
          DEPLOY_KEYPAIR: ${{ secrets.DEPLOY_KEYPAIR }}
        run: |
          mkdir -p ~/.config/solana
          echo "$DEPLOY_KEYPAIR" > ~/.config/solana/id.json
          solana config set --url ${{ env.NETWORK }}
          echo "Deployer: $(solana address)"
          echo "Balance:  $(solana balance)"

      - name: Airdrop SOL on devnet (if needed)
        if: env.NETWORK == 'devnet'
        run: |
          solana airdrop 2 || true
          sleep 5
          echo "Balance after airdrop: $(solana balance)"

      - name: Build program (generate keypair + sync IDs)
        run: |
          # Generate program keypair if absent
          mkdir -p target/deploy
          if [ ! -f target/deploy/neet_pad-keypair.json ]; then
            solana-keygen new --no-bip39-passphrase -o target/deploy/neet_pad-keypair.json
          fi
          # Sync declare_id! in source and Anchor.toml to match keypair
          anchor keys sync
          # Build with Rust 1.82 (generates v3 lockfile → platform-tools can read it)
          # If this fails with "feature edition2024 is required", that crate needs pinning
          anchor build

      - name: Get program ID
        run: |
          PROG_ID=$(solana-keygen pubkey target/deploy/neet_pad-keypair.json)
          echo "PROGRAM_ID=$PROG_ID" >> $GITHUB_ENV
          echo "Program ID: $PROG_ID"

      - name: Deploy to ${{ env.NETWORK }}
        run: |
          anchor deploy --provider.cluster ${{ env.NETWORK }}
          echo "✅ Deployed: ${{ env.PROGRAM_ID }} on ${{ env.NETWORK }}"

      - name: Save IDL & Program ID
        run: |
          mkdir -p frontend/src/idl
          cp target/idl/neet_pad.json frontend/src/idl/
          echo '{"programId":"${{ env.PROGRAM_ID }}","network":"${{ env.NETWORK }}"}' \
            > frontend/src/idl/deployment.json

      - name: Commit IDL back to repo
        uses: EndBug/add-and-commit@v9
        with:
          add: 'frontend/src/idl/'
          message: 'chore: update IDL + deployment info [${{ env.PROGRAM_ID }}]'
          default_author: github_actions

      - name: Summary
        run: |
          echo "## NEET PAD Deployed 🚀" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Program ID | \`${{ env.PROGRAM_ID }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Network | ${{ env.NETWORK }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Explorer | [View](https://explorer.solana.com/address/${{ env.PROGRAM_ID }}?cluster=${{ env.NETWORK }}) |" >> $GITHUB_STEP_SUMMARY
