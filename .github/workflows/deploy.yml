name: Build & Deploy NEET PAD to Devnet

on:
  push:
    branches: [main]
    paths: ['programs/**', 'Anchor.toml', 'Cargo.toml', '.github/workflows/**']
  workflow_dispatch:
    inputs:
      network:
        description: 'Target network'
        required: true
        default: 'devnet'
        type: choice
        options: [devnet, mainnet-beta]

env:
  SOLANA_VERSION: "1.18.22"
  ANCHOR_VERSION: "0.30.1"
  NETWORK: ${{ github.event.inputs.network || 'devnet' }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: rust-stable-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: rust-stable-

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/v${{ env.SOLANA_VERSION }}/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Install Anchor CLI
        run: |
          cargo install anchor-cli --version ${{ env.ANCHOR_VERSION }} --force

      - name: Setup deployer wallet
        env:
          DEPLOY_KEYPAIR: ${{ secrets.DEPLOY_KEYPAIR }}
        run: |
          mkdir -p ~/.config/solana
          echo "$DEPLOY_KEYPAIR" > ~/.config/solana/id.json
          solana config set --url ${{ env.NETWORK }}
          echo "Deployer: $(solana address)"
          echo "Balance:  $(solana balance)"

      - name: Airdrop SOL on devnet (if needed)
        if: env.NETWORK == 'devnet'
        run: |
          solana airdrop 2 || true
          sleep 5
          echo "Balance after airdrop: $(solana balance)"

      - name: Build program
        run: |
          mkdir -p target/deploy
          if [ ! -f target/deploy/neet_pad-keypair.json ]; then
            solana-keygen new --no-bip39-passphrase -o target/deploy/neet_pad-keypair.json
          fi
          anchor keys sync
          # Generate lockfile with Cargo 1.85 (handles all edition2024 deps)
          cargo generate-lockfile
          # Patch v4 → v3: platform-tools Cargo 1.75 can't read v4 lockfiles
          sed -i 's/^version = 4$/version = 3/' Cargo.lock
          sed -i '/^\[metadata\]/,$d' Cargo.lock
          echo "Lockfile: $(grep '^version' Cargo.lock | head -1)"
          # Vendor all deps using system Cargo 1.85 (which handles edition2024 crates)
          # Then patch edition2024 → edition2021 in vendored Cargo.toml files so that
          # platform-tools Cargo 1.75 (used by cargo-build-sbf) can parse them.
          mkdir -p .cargo vendor
          cargo vendor --locked vendor > .cargo/config.toml
          PATCHED=$(find vendor -name "Cargo.toml" -exec grep -l 'edition = "2024"' {} \;)
          if [ -n "$PATCHED" ]; then
            echo "$PATCHED" | xargs sed -i 's/edition = "2024"/edition = "2021"/'
            echo "Patched edition2024 in: $PATCHED"
          else
            echo "No edition2024 manifests found in vendor/"
          fi
          anchor build

      - name: Get program ID
        run: |
          PROG_ID=$(solana-keygen pubkey target/deploy/neet_pad-keypair.json)
          echo "PROGRAM_ID=$PROG_ID" >> $GITHUB_ENV
          echo "Program ID: $PROG_ID"

      - name: Deploy to ${{ env.NETWORK }}
        run: |
          anchor deploy --provider.cluster ${{ env.NETWORK }}
          echo "Deployed: ${{ env.PROGRAM_ID }} on ${{ env.NETWORK }}"

      - name: Save IDL & Program ID
        run: |
          mkdir -p frontend/src/idl
          cp target/idl/neet_pad.json frontend/src/idl/
          echo '{"programId":"${{ env.PROGRAM_ID }}","network":"${{ env.NETWORK }}"}' > frontend/src/idl/deployment.json

      - name: Commit IDL back to repo
        uses: EndBug/add-and-commit@v9
        with:
          add: 'frontend/src/idl/'
          message: 'chore: update IDL + deployment info [${{ env.PROGRAM_ID }}]'
          default_author: github_actions

      - name: Summary
        run: |
          echo "## NEET PAD Deployed" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Program ID | ${{ env.PROGRAM_ID }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Network | ${{ env.NETWORK }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Explorer | https://explorer.solana.com/address/${{ env.PROGRAM_ID }}?cluster=${{ env.NETWORK }} |" >> $GITHUB_STEP_SUMMARY
