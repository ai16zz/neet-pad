name: Build & Deploy NEET PAD to Devnet

on:
  push:
    branches: [main]
    paths: ['programs/**', 'Anchor.toml', 'Cargo.toml']
  workflow_dispatch:
    inputs:
      network:
        description: 'Target network'
        required: true
        default: 'devnet'
        type: choice
        options: [devnet, mainnet-beta]

env:
  SOLANA_VERSION: "1.18.22"
  ANCHOR_VERSION: "0.30.1"
  NETWORK: ${{ github.event.inputs.network || 'devnet' }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: rust-stable-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: rust-stable-

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/v${{ env.SOLANA_VERSION }}/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Install Anchor CLI
        run: |
          # --force without --locked lets Cargo select updated deps (fixes time crate / Rust 1.85)
          cargo install anchor-cli --version ${{ env.ANCHOR_VERSION }} --force

      - name: Setup deployer wallet
        env:
          DEPLOY_KEYPAIR: ${{ secrets.DEPLOY_KEYPAIR }}
        run: |
          mkdir -p ~/.config/solana
          echo "$DEPLOY_KEYPAIR" > ~/.config/solana/id.json
          solana config set --url ${{ env.NETWORK }}
          echo "Deployer: $(solana address)"
          echo "Balance:  $(solana balance)"

      - name: Airdrop SOL on devnet (if needed)
        if: env.NETWORK == 'devnet'
        run: |
          solana airdrop 2 || true
          sleep 5
          echo "Balance after airdrop: $(solana balance)"

      - name: Build program (generate keypair + sync IDs)
        run: |
          # Generate keypair if absent
          mkdir -p target/deploy
          if [ ! -f target/deploy/neet_pad-keypair.json ]; then
            solana-keygen new --no-bip39-passphrase -o target/deploy/neet_pad-keypair.json
          fi

          # Sync declare_id! and Anchor.toml to match keypair
          anchor keys sync

          # Prefetch all dependencies into local cache
          cargo fetch --manifest-path programs/neet-pad/Cargo.toml

          # Generate Cargo.lock with stable Cargo 1.85
          # (handles all edition2024 deps in anchor-lang dep tree)
          cargo generate-lockfile
          echo "Generated lockfile: $(head -2 Cargo.lock | grep version)"

          # CRITICAL: patch lockfile v4 → v3
          # Cargo 1.85 generates v4; Solana platform-tools bundles an older
          # Cargo that errors with "lock file version 4 requires -Znext-lockfile-bump".
          # The v4 format only adds checksums in a [metadata] section; stripping
          # it and changing the version header produces a valid v3 file.
          if grep -q "^version = 4" Cargo.lock; then
            echo "Patching Cargo.lock v4 → v3 for platform-tools compatibility"
            sed -i 's/^version = 4$/version = 3/' Cargo.lock
            # Remove [metadata] checksum section added by v4 (not valid in v3)
            python3 -c "
import re, sys
with open('Cargo.lock') as f:
    content = f.read()
# Remove [metadata] section and everything after it
content = re.sub(r'\n\[metadata\].*', '', content, flags=re.DOTALL)
with open('Cargo.lock', 'w') as f:
    f.write(content)
print('Removed [metadata] section from Cargo.lock')
"
          fi
          echo "Final lockfile: $(head -2 Cargo.lock | grep version)"

          # Build using the pre-fetched cache; offline prevents Cargo from
          # re-resolving and re-writing the lockfile in v4 format
          CARGO_NET_OFFLINE=true anchor build

      - name: Get program ID
        run: |
          PROG_ID=$(solana-keygen pubkey target/deploy/neet_pad-keypair.json)
          echo "PROGRAM_ID=$PROG_ID" >> $GITHUB_ENV
          echo "Program ID: $PROG_ID"

      - name: Deploy to ${{ env.NETWORK }}
        run: |
          anchor deploy --provider.cluster ${{ env.NETWORK }}
          echo "✅ Deployed: ${{ env.PROGRAM_ID }} on ${{ env.NETWORK }}"

      - name: Save IDL & Program ID
        run: |
          mkdir -p frontend/src/idl
          cp target/idl/neet_pad.json frontend/src/idl/
          echo '{"programId":"${{ env.PROGRAM_ID }}","network":"${{ env.NETWORK }}"}' \
            > frontend/src/idl/deployment.json

      - name: Commit IDL back to repo
        uses: EndBug/add-and-commit@v9
        with:
          add: 'frontend/src/idl/'
          message: 'chore: update IDL + deployment info [${{ env.PROGRAM_ID }}]'
          default_author: github_actions

      - name: Summary
        run: |
          echo "## NEET PAD Deployed 🚀" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Program ID | \`${{ env.PROGRAM_ID }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Network | ${{ env.NETWORK }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Explorer | [View](https://explorer.solana.com/address/${{ env.PROGRAM_ID }}?cluster=${{ env.NETWORK }}) |" >> $GITHUB_STEP_SUMMARY
