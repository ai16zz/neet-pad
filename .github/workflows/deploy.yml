name: Build & Deploy NEET PAD to Devnet

on:
  push:
    branches: [main]
    paths: ['programs/**', 'Anchor.toml', 'Cargo.toml']
  workflow_dispatch:
    inputs:
      network:
        description: 'Target network'
        required: true
        default: 'devnet'
        type: choice
        options: [devnet, mainnet-beta]

env:
  SOLANA_VERSION: "1.18.22"
  ANCHOR_VERSION: "0.30.1"
  NETWORK: ${{ github.event.inputs.network || 'devnet' }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: rust-${{ hashFiles('**/Cargo.lock') }}

      - name: Install Rust (pinned for Anchor compatibility)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.79.0"

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/v${{ env.SOLANA_VERSION }}/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Install Anchor CLI via avm
        run: |
          cargo install --version 0.3.0 avm --locked --force
          avm install ${{ env.ANCHOR_VERSION }}
          avm use ${{ env.ANCHOR_VERSION }}
          echo "$HOME/.avm/bin" >> $GITHUB_PATH

      - name: Setup deployer wallet
        env:
          DEPLOY_KEYPAIR: ${{ secrets.DEPLOY_KEYPAIR }}
        run: |
          mkdir -p ~/.config/solana
          echo "$DEPLOY_KEYPAIR" > ~/.config/solana/id.json
          solana config set --url ${{ env.NETWORK }}
          echo "Deployer: $(solana address)"
          echo "Balance:  $(solana balance)"

      - name: Airdrop SOL on devnet (if needed)
        if: env.NETWORK == 'devnet'
        run: |
          solana airdrop 2 || true
          sleep 5
          echo "Balance after airdrop: $(solana balance)"

      - name: Build program
        run: anchor build

      - name: Get program ID
        run: |
          PROG_ID=$(solana-keygen pubkey target/deploy/neet_pad-keypair.json)
          echo "PROGRAM_ID=$PROG_ID" >> $GITHUB_ENV
          echo "Program ID: $PROG_ID"

      - name: Update declare_id! in source
        run: |
          sed -i "s/NEETPadXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX/${{ env.PROGRAM_ID }}/g" \
            programs/neet-pad/src/lib.rs Anchor.toml
          anchor build   # rebuild with correct program ID

      - name: Deploy to ${{ env.NETWORK }}
        run: |
          anchor deploy --provider.cluster ${{ env.NETWORK }}
          echo "✅ Deployed: ${{ env.PROGRAM_ID }} on ${{ env.NETWORK }}"

      - name: Save IDL & Program ID
        run: |
          mkdir -p frontend/src/idl
          cp target/idl/neet_pad.json frontend/src/idl/
          echo '{"programId":"${{ env.PROGRAM_ID }}","network":"${{ env.NETWORK }}"}' \
            > frontend/src/idl/deployment.json

      - name: Commit IDL back to repo
        uses: EndBug/add-and-commit@v9
        with:
          add: 'frontend/src/idl/'
          message: 'chore: update IDL + deployment info [${{ env.PROGRAM_ID }}]'
          default_author: github_actions

      - name: Summary
        run: |
          echo "## NEET PAD Deployed 🚀" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Program ID | \`${{ env.PROGRAM_ID }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Network | ${{ env.NETWORK }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Explorer | [View](https://explorer.solana.com/address/${{ env.PROGRAM_ID }}?cluster=${{ env.NETWORK }}) |" >> $GITHUB_STEP_SUMMARY
