name: Build & Deploy Frontend
on:
  push:
    branches: [main]
    paths:
      - 'scripts/scaffold-frontend.js'
      - 'frontend/**'
      - '.github/workflows/build-frontend.yml'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Write frontend files
        run: |
          mkdir -p frontend
          printf '%s' '' | base64 -d > frontend/index.html
          mkdir -p frontend
          printf '%s' '' | base64 -d > frontend/package.json
          mkdir -p frontend
          printf '%s' 'ZXhwb3J0IGRlZmF1bHQgewogIHBsdWdpbnM6IHsKICAgIHRhaWx3aW5kY3NzOiB7fSwKICAgIGF1dG9wcmVmaXhlcjoge30sCiAgfSwKfQo=' | base64 -d > frontend/postcss.config.js
          mkdir -p frontend
          printf '%s' 'LyoqIEB0eXBlIHtpbXBvcnQoJ3RhaWx3aW5kY3NzJykuQ29uZmlnfSAqLwpleHBvcnQgZGVmYXVsdCB7CiAgY29udGVudDogWwogICAgIi4vaW5kZXguaHRtbCIsCiAgICAiLi9zcmMvKiovKi57anMsdHMsanN4LHRzeH0iLAogIF0sCiAgdGhlbWU6IHsKICAgIGV4dGVuZDoge30sCiAgfSwKICBwbHVnaW5zOiBbXSwKfQo=' | base64 -d > frontend/tailwind.config.js
          mkdir -p frontend
          printf '%s' 'aW1wb3J0IHsgZGVmaW5lQ29uZmlnIH0gZnJvbSAndml0ZScKaW1wb3J0IHJlYWN0IGZyb20gJ0B2aXRlanMvcGx1Z2luLXJlYWN0JwoKZXhwb3J0IGRlZmF1bHQgZGVmaW5lQ29uZmlnKHsKICBwbHVnaW5zOiBbcmVhY3QoKV0sCiAgZGVmaW5lOiB7CiAgICAncHJvY2Vzcy5lbnYnOiB7fSwKICAgIGdsb2JhbDogJ2dsb2JhbFRoaXMnLAogIH0sCn0pCg==' | base64 -d > frontend/vite.config.js
          mkdir -p frontend/src
          printf '%s' '' | base64 -d > frontend/src/App.jsx
          mkdir -p frontend/src
          printf '%s' 'QHRhaWx3aW5kIGJhc2U7CkB0YWlsd2luZCBjb21wb25lbnRzOwpAdGFpbHdpbmQgdXRpbGl0aWVzOwo9' | base64 -d > frontend/src/index.css
          mkdir -p frontend/src
          printf '%s' '' | base64 -d > frontend/src/main.jsx
          mkdir -p frontend/src/components
          printf '%s' '' | base64 -d > frontend/src/components/NavBar.jsx
          mkdir -p frontend/src/components
          printf '%s' '' | base64 -d > frontend/src/components/TokenCard.jsx
          mkdir -p frontend/src/pages
          printf '%s' '' | base64 -d > frontend/src/pages/CreateToken.jsx
          mkdir -p frontend/src/pages
          printf '%s' '' | base64 -d > frontend/src/pages/Home.jsx
          mkdir -p frontend/src/pages
          printf '%s' '' | base64 -d > frontend/src/pages/TokenPage.jsx
          mkdir -p frontend/src/utils
          printf '%s' '' | base64 -d > frontend/src/utils/bondingCurve.js
          mkdir -p frontend/src/utils
          printf '%s' '' | base64 -d > frontend/src/utils/pinata.js
          mkdir -p frontend/src/utils
          printf '%s' '' | base64 -d > frontend/src/utils/program.js
      - name: Install frontend dependencies
        run: npm install --prefix frontend
      - name: Build frontend
        env:
          VITE_PINATA_JWT: ${{ secrets.VITE_PINATA_JWT }}
          VITE_PINATA_GATEWAY: ${{ secrets.VITE_PINATA_GATEWAY }}
          VITE_PROGRAM_ID: FAL3eAhkTv4twLCht4UFwSVdKtBp4Tg17yGwJFfjVfpp
          VITE_NETWORK: devnet
        run: npm run build --prefix frontend
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./frontend/dist
          force_orphan: true

