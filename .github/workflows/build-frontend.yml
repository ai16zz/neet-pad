name: Build & Deploy Frontend

on:
  push:
    branches: [main]
    paths:
      - 'scripts/scaffold-frontend.js'
      - 'frontend/**'
      - '.github/workflows/build-frontend.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Scaffold frontend files
        run: |
          node scripts/scaffold-frontend.js
          find frontend/src -name "*.jsx" -exec sed -i 's/element\^{/element={/g' {} \;

      - name: Install frontend dependencies
        run: npm install --prefix frontend

      - name: Build frontend
        env:
          VITE_PINATA_JWT: ${{ secrets.VITE_PINATA_JWT }}
          VITE_PINATA_GATEWAY: ${{ secrets.VITE_PINATA_GATEWAY }}
          VITE_PROGRAM_ID: FAL3eAhkTv4twLCht4UFwSVdKtBp4Tg17yGwJFfjVfpp
          VITE_NETWORK: devnet
        run: npm run build --prefix frontend

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./frontend/dist
          force_orphan: true
